---
- name: "Install Brave Browser"
  ansible.builtin.include_role:
    name: add_apt_repo
  vars:
    repo_name: brave
    repo_key_file_name: brave-browser-archive-keyring.gpg
    repo_gpg_key_url: https://brave-browser-apt-release.s3.brave.com/brave-browser-archive-keyring.gpg
    repo_repo_url: https://brave-browser-apt-release.s3.brave.com
    repo_repo_type: stable
    repo_release_channel: main

- name: "Install Packages"
  ansible.builtin.apt:
    name: "{{ brave_packages }}"
    update_cache: true
