---
- name: "Install gcloud"
  ansible.builtin.include_role:
    name: add_apt_repo
  vars:
    repo_name: gcloud
    repo_key_file_name: cloud.google.gpg
    repo_gpg_key_url: https://packages.cloud.google.com/apt/doc/apt-key.gpg
    repo_url: https://packages.cloud.google.com/apt
    repo_type: cloud-sdk
    repo_release_channel: main

- name: "Install Packages"
  ansible.builtin.apt:
    name: "{{ gcloud_packages }}"
    update_cache: true
